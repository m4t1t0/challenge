framework:
    cache:
        # The application cache is backed by Redis: shared across nodes so the
        # cache and its invalidation are fleet-wide rather than per-container.
        app: cache.adapter.redis
        default_redis_provider: '%env(REDIS_URL)%'

when@test:
    framework:
        cache:
            # In-memory, per-kernel cache keeps functional tests isolated and
            # free of a Redis dependency.
            app: cache.adapter.array
